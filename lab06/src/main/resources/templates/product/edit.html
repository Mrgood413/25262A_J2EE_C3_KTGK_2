<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <form th:action="@{/products/edit}" th:object="${product}" method="post" class="form" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{image}">

        <div class="form-group mb-3">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="product Name">
            <div class="alert alert-warning mt-2" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="price">Price</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="price">
            <div class="alert alert-warning mt-2" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group mb-3">
            <label for="image">Image:</label>
            <input accept="image/png,image/jpeg,image/jpg" class="form-control" type="file" id="image"
                   name="imageProduct">
            <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                 th:src="@{'/images/' + ${product.image}}" alt="Product image" width="120" class="mt-2">
        </div>

        <div class="form-group mb-3">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>

        <input type="submit" class="btn btn-success" value="Update Product">
    </form>
</div>
</body>
</html>
